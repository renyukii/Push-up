<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💦 Horny Workout Trainer</title>
    <link rel="manifest" href="manifest.json">

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a0014, #1a0022);
            font-family: 'Inter', sans-serif;
            touch-action: none;
            color: #fff;
        }

        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #myVideo { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: filter 1.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px 24px;
        }

        .header { 
            text-align: center; 
            background: rgba(10, 0, 20, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 9999px;
            padding: 14px 28px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(255,20,147,0.25);
        }
        .subtitle { 
            font-size: 1.45rem; 
            font-weight: 600;
            color: #ff1493;
            text-shadow: 0 0 25px rgba(255,20,147,0.6);
            letter-spacing: -0.5px;
            opacity: 0.95;
        }

        .counter-box {
            background: rgba(255,255,255,0.09);
            backdrop-filter: blur(22px);
            border: 2px solid rgba(255,20,147,0.55);
            border-radius: 28px;
            padding: 18px 32px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,20,147,0.35),
                        inset 0 0 25px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 320px;
        }
        .counter-label { 
            font-size: 0.95rem; 
            letter-spacing: 2.5px; 
            color: #ff99cc; 
            font-weight: 500; 
        }
        .counter-number { 
            font-size: 4.35rem; 
            font-weight: 700; 
            line-height: 1; 
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .timer-running .counter-number { animation: timerPulse 1.2s infinite ease-in-out; }
        @keyframes timerPulse { 50% { transform: scale(1.08); } }

        .goal-progress { 
            height: 8px; 
            background: linear-gradient(90deg, #ff1493, #ff69b4); 
            border-radius: 9999px; 
            margin-top: 12px; 
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        canvas#particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .action-btn { 
            background: linear-gradient(90deg, #ff1493, #ff4da6);
            padding: 17px 56px; 
            border-radius: 9999px;
            font-size: 1.4rem; 
            font-weight: 600;
            box-shadow: 0 18px 45px rgba(255,20,147,0.55);
            pointer-events: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        .action-btn:active { transform: scale(0.94); }

        .touch-flash { 
            position: fixed; width: 130px; height: 130px;
            background: radial-gradient(circle, rgba(255,105,180,0.9) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10;
            animation: flashPop 800ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes flashPop { 
            0% { transform: scale(0.1); opacity: 1; } 
            100% { transform: scale(4.5); opacity: 0; } 
        }

        #settingsBtn, #addVideosBtn {
            position: fixed; top: 20px; right: 20px; z-index: 30;
            background: rgba(0,0,0,0.5); color: #ff69b4; border: none;
            width: 52px; height: 52px; border-radius: 50%; font-size: 26px;
            box-shadow: 0 0 25px rgba(255,105,180,0.4);
            transition: all 0.3s ease;
        }
        #addVideosBtn { right: 82px; font-size: 24px; }

        .dirty-text { 
            position: absolute; font-size: 1.5rem; font-weight: 700;
            color: #ff99cc; text-shadow: 0 0 30px #ff1493;
            pointer-events: none; animation: dirtyPop 3.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; z-index: 20;
        }
        @keyframes dirtyPop {
            0% { transform: scale(0.3) translateY(70px); opacity: 0; }
            30% { transform: scale(1.2) translateY(-35px); opacity: 1; }
            75% { opacity: 1; }
            100% { transform: scale(0.8) translateY(-140px); opacity: 0; }
        }

        #settingsPanel {
            position:fixed; top:0; right:-340px; width:340px; height:100%;
            background: rgba(10,0,20,0.96); backdrop-filter: blur(20px);
            z-index:40; padding:30px; color:#ffb3d1;
            transition:right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y:auto;
            border-left: 1px solid rgba(255,20,147,0.3);
            touch-action: auto;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 9px;
            background: linear-gradient(to right, #ff69b4, #ff1493);
            border-radius: 9999px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,20,147,0.4);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 32px;
            height: 32px;
            background: #fff;
            border: 4px solid #ff1493;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255,20,147,0.8),
                        0 4px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.25);
            box-shadow: 0 0 35px rgba(255,20,147,1);
        }

        .mode-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .mode-card.active { border-color: #ff1493; background: rgba(255,20,147,0.15); }
        .emoji-picker { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
            margin-top: 12px; 
        }
        .emoji-btn { 
            font-size: 1.9rem; 
            padding: 10px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 14px; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .emoji-btn:hover { transform: scale(1.25); background: #ff1493; }

        .progress-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }

        .moan-item, .video-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .rep-flash {
            position: fixed;
            font-size: 3rem;
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 0 40px #ff69b4;
            pointer-events: none;
            animation: repPop 900ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
            z-index: 25;
        }
        @keyframes repPop {
            0% { transform: scale(0.4) translateY(0); opacity: 1; }
            40% { transform: scale(1.3) translateY(-60px); }
            100% { transform: scale(0.9) translateY(-140px); opacity: 0; }
        }
    </style>
</head>

                <input type="checkbox" id="hapticsToggle" style="margin-right:12px;width:22px;height:22px;accent-color:#ff1493;">
                <span style="flex:1;font-size:1.05rem;">Enable light vibration on taps</span>
            </label>
        </div>

        <button onclick="setNewGoal()" 
                style="width:100%;margin-top:24px;padding:18px;background:linear-gradient(90deg,#ff1493,#ff4da6);color:#fff;border:none;border-radius:9999px;font-size:1.2rem;font-weight:600;">
            💾 Save Everything
        </button>

        <button id="closeSettings" style="margin-top:40px;width:100%;padding:14px;background:rgba(255,255,255,0.1);border:2px solid #ff69b4;border-radius:9999px;color:#ffb3d1;">Close</button>

    <script>
        // ================== CORE VARIABLES ==================
        let currentMode = 'pushups';
        let goal = 50;
        let videos = [];
        let currentVideoIndex = 0;
        let isRewardMode = false;

        let timerInterval = null;
        let isTimerRunning = false;

        let globalVolume = 0.85;
        let customMoans = [];
        let enableHaptics = true;

        let lastMoanTime = 0;
        let lastDirtyTextTime = 0;
        let lastParticleTime = 0;
        let isSettingsOpen = false;

        let dailyChecklist = {};

        let modes = {
            pushups: { name: "Push for Pussy", emoji: "💦", icon: "💪", type: "reps", label: "PUSH-UPS" },
            squats:  { name: "Squat for Pussy", emoji: "🍑", icon: "🦵", type: "reps", label: "SQUATS" },
            situps:  { name: "Sit-up for Pussy", emoji: "🔥", icon: "🪑", type: "reps", label: "SIT-UPS" },
            plank:   { name: "Plank for Pussy", emoji: "🥵", icon: "🧱", type: "timer", label: "PLANK" },
            wallsit: { name: "Wall-sit for Pussy", emoji: "🔥", icon: "🧱", type: "timer", label: "WALL-SIT" },
            lunges:  { name: "Lunge for Pussy", emoji: "🍑", icon: "🦵", type: "reps", label: "LUNGES" },
            burpees: { name: "Burpee for Pussy", emoji: "🔥", icon: "🏃", type: "reps", label: "BURPEES" },
            mountainclimbers: { name: "Climber for Pussy", emoji: "🏔️", icon: "🏔️", type: "reps", label: "CLIMBERS" }
        };

        let pushupsCount = 0, squatsCount = 0, situpsCount = 0, lungesCount = 0, burpeesCount = 0, mountainclimbersCount = 0;
        let plankSeconds = 0, wallsitSeconds = 0;

        const videoEl = document.getElementById('myVideo');
        const counterEl = document.getElementById('counter');
        const progressEl = document.getElementById('progress');
        const goalProgressEl = document.getElementById('goalProgress');
        const goalTextEl = document.getElementById('goalText');
        const counterLabelEl = document.getElementById('counterLabel');
        const actionBtn = document.getElementById('actionBtn');
        const counterBox = document.getElementById('counterBox');

        // ================== INDEXEDDB ==================
        let dbInstance = null;
        const DB_NAME = 'HornyWorkoutDB';
        const DB_VERSION = 1;

        async function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('videos')) {
                        db.createObjectStore('videos', { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => {
                    dbInstance = e.target.result;
                    resolve(dbInstance);
                };
                req.onerror = (e) => reject(e.target.error);
            });
        }

        async function getAllVideos() {
            if (!dbInstance) await openDB();
            return new Promise((resolve) => {
                const tx = dbInstance.transaction('videos', 'readonly');
                const store = tx.objectStore('videos');
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        }

        async function addVideoToDB(file) {
            if (!dbInstance) await openDB();
            return new Promise((resolve) => {
                const tx = dbInstance.transaction('videos', 'readwrite');
                const store = tx.objectStore('videos');
                const entry = {
                    id: 'vid-' + Date.now() + '-' + Math.random().toString(36).slice(2),
                    name: file.name,
                    type: file.type,
                    blob: file
                };
                const req = store.add(entry);
                req.onsuccess = () => resolve(entry.id);
                req.onerror = () => resolve(null);
            });
        }

        async function deleteVideoFromDB(id) {
            if (!dbInstance) await openDB();
            return new Promise((resolve) => {
                const tx = dbInstance.transaction('videos', 'readwrite');
                const store = tx.objectStore('videos');
                const req = store.delete(id);
                req.onsuccess = () => resolve(true);
                req.onerror = () => resolve(false);
            });
        }

        // ================== SAVE / LOAD ==================
        function saveProgress() {
            localStorage.setItem('currentMode', currentMode);
            localStorage.setItem('goal', goal);
            localStorage.setItem('globalVolume', globalVolume);
            localStorage.setItem('customMoans', JSON.stringify(customMoans));
            localStorage.setItem('enableHaptics', enableHaptics);
            localStorage.setItem('dailyChecklist', JSON.stringify(dailyChecklist));

            localStorage.setItem('pushupsCount', pushupsCount);
            localStorage.setItem('squatsCount', squatsCount);
            localStorage.setItem('situpsCount', situpsCount);
            localStorage.setItem('lungesCount', lungesCount);
            localStorage.setItem('burpeesCount', burpeesCount);
            localStorage.setItem('mountainclimbersCount', mountainclimbersCount);
            localStorage.setItem('plankSeconds', plankSeconds);
            localStorage.setItem('wallsitSeconds', wallsitSeconds);

            Object.keys(modes).forEach(m => localStorage.setItem(m + 'Emoji', modes[m].emoji));
        }

        function loadProgress() {
            const savedMode = localStorage.getItem('currentMode');
            if (savedMode && modes[savedMode]) currentMode = savedMode;

            const savedGoal = localStorage.getItem('goal');
            if (savedGoal) goal = parseInt(savedGoal);

            const savedVol = localStorage.getItem('globalVolume');
            if (savedVol) globalVolume = parseFloat(savedVol);

            const savedMoans = localStorage.getItem('customMoans');
            if (savedMoans) customMoans = JSON.parse(savedMoans);

            const savedHaptics = localStorage.getItem('enableHaptics');
            if (savedHaptics !== null) enableHaptics = savedHaptics === 'true';

            dailyChecklist = JSON.parse(localStorage.getItem('dailyChecklist') || '{}');

            pushupsCount = parseInt(localStorage.getItem('pushupsCount') || 0);
            squatsCount = parseInt(localStorage.getItem('squatsCount') || 0);
            situpsCount = parseInt(localStorage.getItem('situpsCount') || 0);
            lungesCount = parseInt(localStorage.getItem('lungesCount') || 0);
            burpeesCount = parseInt(localStorage.getItem('burpeesCount') || 0);
            mountainclimbersCount = parseInt(localStorage.getItem('mountainclimbersCount') || 0);
            plankSeconds = parseInt(localStorage.getItem('plankSeconds') || 0);
            wallsitSeconds = parseInt(localStorage.getItem('wallsitSeconds') || 0);

            Object.keys(modes).forEach(m => {
                const savedEmoji = localStorage.getItem(m + 'Emoji');
                if (savedEmoji) modes[m].emoji = savedEmoji;
            });
        }

        async function loadVideos() {
            const saved = await getAllVideos();
            videos = [];
            for (let v of saved) {
                const url = URL.createObjectURL(v.blob);
                videos.push({ id: v.id, name: v.name, url });
            }
        }

        // ================== PARTICLES ==================
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d', { alpha: true });
        let particlesArray = [];

        class Particle {
            constructor(x, y, emoji) {
                this.x = x; this.y = y;
                this.size = Math.random() * 18 + 12;
                this.speedX = Math.random() * 3.5 - 1.8;
                this.speedY = Math.random() * -8 - 9;
                this.life = 130;
                this.gravity = 0.055;
                this.emoji = emoji;
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 2;
                this.alphaPulse = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.speedX *= 0.978;
                this.life--;
                this.size *= 0.98;
                this.rotation += this.rotSpeed;
                this.alphaPulse += 0.11;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = (this.life / 130) * (0.8 + Math.sin(this.alphaPulse) * 0.2);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        function createDreamParticles(count, x, y) {
            if (particlesArray.length > 35) particlesArray.length = 22;
            const emoji = modes[currentMode].emoji;
            for (let i = 0; i < count; i++) {
                particlesArray.push(new Particle(x + (Math.random()*60-30), y + (Math.random()*60-30), emoji));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particlesArray.length-1; i >= 0; i--) {
                particlesArray[i].update();
                particlesArray[i].draw();
                if (particlesArray[i].life <= 0 || particlesArray[i].size <= 2) particlesArray.splice(i,1);
            }
            requestAnimationFrame(animateParticles);
        }

        function showDirtyText(text, x=null, y=null) {
            const el = document.createElement('div');
            el.className = 'dirty-text';
            el.textContent = text;
            if (x && y) {
                el.style.left = `${x-100}px`;
                el.style.top = `${y-50}px`;
            } else {
                el.style.left = `${20 + Math.random()*60}%`;
                el.style.bottom = `${30 + Math.random()*35}%`;
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function showRepFlash(count, x, y) {
            const flash = document.createElement('div');
            flash.className = 'rep-flash';
            flash.textContent = `+${count}`;
            flash.style.left = `${x - 40}px`;
            flash.style.top = `${y - 80}px`;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1100);
